<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기기능사 필기 모의시험</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f0f4f8; min-height: 100vh; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── 로그인 ── */
#loginScreen { justify-content: center; align-items: center; background: linear-gradient(135deg, #1a3c5e 0%, #2563a8 100%); }
.login-box { background: white; border-radius: 16px; padding: 44px 40px; width: 380px; max-width: 94vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-box h1 { text-align: center; font-size: 1.4rem; color: #1e3a5f; margin-bottom: 4px; }
.login-box .subtitle { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 28px; }
.login-box label { display: block; font-size: 0.85rem; color: #374151; font-weight: 600; margin-bottom: 6px; }
.login-box input { width: 100%; padding: 11px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; outline: none; transition: border-color .2s; }
.login-box input:focus { border-color: #2563a8; }
.btn-start { width: 100%; padding: 13px; background: #2563a8; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; }
.btn-start:hover { background: #1e4d8a; }

/* ── 시험 선택 ── */
#selectScreen { justify-content: center; align-items: center; background: linear-gradient(135deg, #1a3c5e 0%, #2563a8 100%); }
.select-box { background: white; border-radius: 16px; padding: 40px 36px; width: 520px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.select-box h2 { text-align: center; font-size: 1.3rem; color: #1e3a5f; margin-bottom: 8px; }
.select-box .sel-sub { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }
.exam-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.exam-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border: 2px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-family: inherit; transition: all .2s; }
.exam-item:hover { border-color: #2563a8; background: #eff6ff; }
.exam-icon { font-size: 1.8rem; }
.exam-info strong { display: block; font-size: 1rem; color: #1e3a5f; }
.exam-info span { font-size: 0.82rem; color: #64748b; }
.btn-back { width: 100%; padding: 11px; background: #f1f5f9; color: #475569; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
.btn-back:hover { background: #e2e8f0; }

/* ── 시험 헤더 ── */
#examScreen header { background: #1e3a5f; color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#examScreen header .h-title { font-size: 0.95rem; font-weight: 700; flex: 1; }
#examScreen header .h-user { font-size: 0.82rem; opacity: .85; }
.timer { background: #2563a8; border-radius: 20px; padding: 4px 14px; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
.timer.warning { background: #dc2626; animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── 진행바 ── */
.progress-wrap { background: #e2e8f0; height: 5px; }
.progress-bar { height: 100%; background: #2563a8; transition: width .3s; }

/* ── 문제 영역 ── */
.exam-body { flex: 1; display: flex; gap: 0; overflow: hidden; }
.q-panel { flex: 1; padding: 20px; overflow-y: auto; }
.q-num { font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
.q-subject { display: inline-block; background: #dbeafe; color: #1e40af; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px; font-weight: 600; }
.q-text { font-size: 1rem; color: #1e293b; line-height: 1.65; margin-bottom: 20px; font-weight: 600; }
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-family: inherit; font-size: 0.93rem; color: #374151; transition: all .2s; }
.choice-btn:hover { border-color: #2563a8; background: #eff6ff; }
.choice-btn.selected { border-color: #2563a8; background: #dbeafe; font-weight: 700; color: #1e3a5f; }
.choice-num { font-weight: 700; color: #2563a8; min-width: 20px; }

/* ── 네비게이션 ── */
.nav-bar { padding: 12px 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
.btn-nav { padding: 10px 22px; border: 2px solid #d1d5db; border-radius: 8px; background: white; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-nav:hover:not(:disabled) { border-color: #2563a8; color: #2563a8; }
.btn-nav:disabled { opacity: .4; cursor: not-allowed; }
.q-counter { flex: 1; text-align: center; font-size: 0.85rem; color: #64748b; }
.btn-submit { padding: 10px 22px; background: #2563a8; color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
.btn-submit:hover { background: #1e4d8a; }

/* ── 문제 맵 ── */
.q-map-panel { width: 200px; background: #f8fafc; border-left: 1px solid #e2e8f0; padding: 12px; overflow-y: auto; display: none; }
@media(min-width:700px){ .q-map-panel { display: block; } }
.q-map-title { font-size: 0.78rem; font-weight: 700; color: #475569; margin-bottom: 10px; }
.q-map { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
.q-dot { width: 100%; aspect-ratio: 1; border: none; border-radius: 5px; background: #e2e8f0; font-size: 0.7rem; cursor: pointer; transition: background .15s; }
.q-dot.answered { background: #2563a8; color: white; }
.q-dot.current { outline: 2px solid #f59e0b; outline-offset: 1px; }

/* ── 결과 화면 ── */
#resultScreen { background: #f0f4f8; }
.result-header { background: #1e3a5f; color: white; padding: 20px; text-align: center; }
.result-header h2 { font-size: 1.3rem; }
.result-header .score-big { font-size: 3.5rem; font-weight: 900; margin: 10px 0 4px; }
.result-header .score-label { font-size: 0.9rem; opacity: .8; }
.pass-badge { display: inline-block; margin-top: 10px; padding: 4px 18px; border-radius: 20px; font-weight: 700; font-size: 1rem; }
.pass-badge.pass { background: #22c55e; }
.pass-badge.fail { background: #ef4444; }
.result-body { padding: 20px; max-width: 800px; margin: 0 auto; }
.result-stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 100px; background: white; border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.stat-card .sv { font-size: 1.8rem; font-weight: 900; color: #1e3a5f; }
.stat-card .sl { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
.wrong-list h3 { font-size: 1rem; color: #374151; margin-bottom: 12px; font-weight: 700; }
.wrong-item { background: white; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-left: 4px solid #ef4444; }
.wrong-item .wi-num { font-size: 0.78rem; color: #64748b; margin-bottom: 4px; }
.wrong-item .wi-q { font-size: 0.93rem; color: #1e293b; font-weight: 600; margin-bottom: 10px; }
.wrong-item .wi-ans { font-size: 0.85rem; margin-bottom: 4px; }
.wrong-item .wi-ans.my { color: #ef4444; }
.wrong-item .wi-ans.correct { color: #16a34a; font-weight: 700; }
.wrong-item .wi-exp { font-size: 0.83rem; color: #475569; background: #f8fafc; border-radius: 6px; padding: 8px 10px; margin-top: 8px; line-height: 1.55; }
.result-btns { display: flex; gap: 10px; padding: 0 0 24px; }
.result-btns button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
.btn-history { background: #e2e8f0; color: #374151; }
.btn-retry { background: #2563a8; color: white; }

/* ── 히스토리 ── */
#historyScreen { background: #f0f4f8; }
.history-header { background: #1e3a5f; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.history-header h2 { flex: 1; font-size: 1.1rem; }
.btn-close-h { background: rgba(255,255,255,.2); border: none; color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
.history-body { padding: 20px; max-width: 800px; margin: 0 auto; }
.history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.history-table th { background: #f1f5f9; padding: 10px 12px; text-align: left; font-size: 0.82rem; color: #475569; }
.history-table td { padding: 10px 12px; font-size: 0.88rem; border-top: 1px solid #f1f5f9; color: #374151; }
.history-table tr:hover td { background: #f8fafc; }
.score-cell { font-weight: 700; }
.score-cell.pass { color: #16a34a; }
.score-cell.fail { color: #dc2626; }
.no-history { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.9rem; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <h1>⚡ 전기기능사 필기</h1>
    <p class="subtitle">모의시험 프로그램</p>
    <label>학번</label>
    <input id="inputNumber" type="text" placeholder="학번을 입력하세요" maxlength="20">
    <label>이름</label>
    <input id="inputName" type="text" placeholder="이름을 입력하세요" maxlength="10">
    <button class="btn-start" onclick="goToSelect()">시험 선택하기 →</button>
  </div>
</div>

<!-- 시험 선택 -->
<div id="selectScreen" class="screen">
  <div class="select-box">
    <h2>📋 시험 선택</h2>
    <p class="sel-sub">응시할 기출문제를 선택하세요</p>
    <div class="exam-list">
      <button class="exam-item" onclick="selectExam('2021_3')">
        <span class="exam-icon">⚡</span>
        <div class="exam-info">
          <strong>2021년 3회 전기기능사</strong>
          <span>60문제 · 60분 · 제1·2·3과목</span>
        </div>
      </button>
      <button class="exam-item" onclick="selectExam('2021_2')">
        <span class="exam-icon">⚡</span>
        <div class="exam-info">
          <strong>2021년 2회 전기기능사</strong>
          <span>60문제 · 60분 · 제1·2·3과목</span>
        </div>
      </button>
      <button class="exam-item" onclick="selectExam('2021_1')">
        <span class="exam-icon">⚡</span>
        <div class="exam-info">
          <strong>2021년 1회 전기기능사</strong>
          <span>60문제 · 60분 · 제1·2·3과목</span>
        </div>
      </button>
    </div>
    <button class="btn-back" onclick="showScreen('loginScreen')">← 뒤로</button>
  </div>
</div>

<!-- 시험 화면 -->
<div id="examScreen" class="screen">
  <header>
    <div class="h-title" id="headerExam">전기기능사 필기 모의시험</div>
    <div class="h-user" id="headerUser"></div>
    <div class="timer" id="timer">60:00</div>
  </header>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="exam-body">
    <div class="q-panel">
      <div class="q-num" id="qNum"></div>
      <div class="q-subject" id="qSubject"></div>
      <div class="q-text" id="qText"></div>
      <div class="choices" id="choices"></div>
    </div>
    <div class="q-map-panel">
      <div class="q-map-title">문제 목록</div>
      <div class="q-map" id="qMap"></div>
    </div>
  </div>
  <div class="nav-bar">
    <button class="btn-nav" id="btnPrev" onclick="moveTo(currentQ-1)">◀ 이전</button>
    <div class="q-counter" id="qCounter"></div>
    <button class="btn-nav" id="btnNext" onclick="moveTo(currentQ+1)">다음 ▶</button>
    <button class="btn-submit" onclick="confirmSubmit()">제출</button>
  </div>
</div>

<!-- 결과 화면 -->
<div id="resultScreen" class="screen">
  <div class="result-header">
    <h2 id="resultTitle">시험 결과</h2>
    <div class="score-big" id="scoreBig"></div>
    <div class="score-label">점 / 100점</div>
    <div class="pass-badge" id="passBadge"></div>
  </div>
  <div class="result-body">
    <div class="result-stats">
      <div class="stat-card"><div class="sv" id="statCorrect"></div><div class="sl">정답</div></div>
      <div class="stat-card"><div class="sv" id="statWrong"></div><div class="sl">오답</div></div>
      <div class="stat-card"><div class="sv" id="statUnanswered"></div><div class="sl">미응답</div></div>
      <div class="stat-card"><div class="sv" id="statTime"></div><div class="sl">소요시간</div></div>
    </div>
    <div class="result-btns">
      <button class="btn-history" onclick="showHistory()">📋 성적 기록</button>
      <button class="btn-retry" onclick="retryExam()">🔄 다시 선택</button>
    </div>
    <div class="wrong-list">
      <h3>오답 풀이</h3>
      <div id="wrongItems"></div>
    </div>
  </div>
</div>

<!-- 히스토리 화면 -->
<div id="historyScreen" class="screen">
  <div class="history-header">
    <h2>📋 성적 기록</h2>
    <button class="btn-close-h" onclick="showScreen('resultScreen')">닫기</button>
  </div>
  <div class="history-body">
    <div id="historyContent"></div>
  </div>
</div>

<script>
const EXAM_TITLES = { '2021_1': '2021년 1회', '2021_2': '2021년 2회', '2021_3': '2021년 3회' };

const EXAM_LIST = {
  '2021_1': [
    // Q1
    { subject:'전기이론', q:'물체가 가지고 있는 전기의 양을 뜻하며 물질이 가진 고유한 전기적 성질을 무엇이라고 하는가?', choices:['대전','전하','방전','양자'], answer:2, exp:'전하(電荷)는 물질이 가진 전기의 양을 나타내는 물리량으로 물질 고유의 전기적 성질이다.' },
    // Q2
    { subject:'전기이론', q:'1Ah는 몇 C인가?', choices:['7200','3600','120','60'], answer:2, exp:'1Ah = 1A × 3600s = 3600C (1시간 = 3600초)' },
    // Q3
    { subject:'전기이론', q:'4Ω의 저항과 6Ω의 저항을 직렬로 접속할 때 합성 컨덕턴스는 몇 S인가?', choices:['0.1','0.2','0.5','2.4'], answer:1, exp:'직렬 합성저항 = 4+6 = 10Ω, 컨덕턴스 G = 1/R = 1/10 = 0.1 S' },
    // Q4
    { subject:'전기이론', q:'패러데이 관(Faraday tube)의 단위 전위차 당 보유 에너지는 몇 J인가?', choices:['1','2','1/2(ε E)','1/2'], answer:4, exp:'패러데이 관의 단위 전위차 당 보유 에너지는 1/2 J이다.' },
    // Q5
    { subject:'전기이론', q:'어느 정도 이상으로 전압이 높아지면 급격히 저항이 낮아지는 성질을 이용하여 이상전압에 대하여 회로를 보호하기 위한 소자는?', choices:['다이오드','SCR','바리스터','커패시터'], answer:3, exp:'바리스터(Varistor, VDR)는 인가 전압이 일정값 이상이 되면 저항이 급격히 감소하여 과전압으로부터 회로를 보호한다.' },
    // Q6
    { subject:'전기이론', q:'10V와 15V의 전원을 직렬로 연결하고 이 사이에 5Ω의 저항을 넣었을 때 흐르는 전류는 몇 A인가?', choices:['2','3','4','5'], answer:4, exp:'직렬 전원 합 = 10+15 = 25V, I = V/R = 25/5 = 5A' },
    // Q7
    { subject:'전기이론', q:'저항 R₁, R₂를 병렬로 연결하고 전전류가 I[A]라면, R₁에 흐르는 전류 I₁은?', choices:['I₁ = R₁/(R₁+R₂) × I','I₁ = R₂/(R₁+R₂) × I','I₁ = (R₁+R₂)/R₁ × I','I₁ = (R₁+R₂)/R₂ × I'], answer:2, exp:'병렬회로 전류 분배: 각 저항에 흐르는 전류는 반대쪽 저항에 비례한다. I₁ = R₂/(R₁+R₂) × I' },
    // Q8
    { subject:'전기이론', q:'중첩의 정리를 이용하여 회로를 해석할 때 전압원과 전류원은 각각 어떻게 하여야 하는가?', choices:['전압원-단락, 전류원-개방','전압원-개방, 전류원-개방','전압원-개방, 전류원-단락','전압원-단락, 전류원-단락'], answer:1, exp:'중첩의 정리 적용 시 전압원은 단락(내부저항=0으로 처리), 전류원은 개방(내부저항=∞으로 처리)한다.' },
    // Q9
    { subject:'전기이론', q:'"중첩의 정리를 이용하여 회로를 해석할 때 전압원은 (㉠)하고, 전류원은 (㉡)한다."에서 알맞은 말은?', choices:['㉠ 개방, ㉡ 개방','㉠ 개방, ㉡ 단락','㉠ 단락, ㉡ 단락','㉠ 단락, ㉡ 개방'], answer:4, exp:'중첩의 정리에서 전압원은 ㉠단락, 전류원은 ㉡개방으로 처리한다.' },
    // Q10
    { subject:'전기이론', q:'다음 중 1J과 같은 것은?', choices:['1kcal','1W/sec','1W·sec','860kWh'], answer:3, exp:'1J = 1W × 1s = 1W·sec (와트초). 1kcal ≈ 4186J, 1kWh = 3,600,000J이다.' },
    // Q11
    { subject:'전기이론', q:'같은 크기의 저항 4개를 접속하여 얻어지는 경우 중에서 소비전력이 가장 큰 것은?', choices:['직렬과 병렬은 관계없다','둘 다 같다','모두 병렬로 접속','모두 직렬로 접속'], answer:3, exp:'일정 전압에서 P = V²/R이므로 합성저항이 작을수록 소비전력이 크다. 모두 병렬 접속 시 합성저항이 최소이므로 소비전력이 최대이다.' },
    // Q12
    { subject:'전기이론', q:'"금속 A와 B로 만든 열전쌍 회로에 임의의 금속 C를 삽입해도 C 양 끝의 온도를 같게 유지하면 열기전력은 변하지 않는다." 이것이 설명하는 것은?', choices:['제백 효과','봉슨 효과','제3 금속의 법칙','펠티에 법칙'], answer:3, exp:'제3 금속의 법칙(Law of intermediate metals): 열전쌍 회로에 제3의 금속을 삽입해도 그 양끝 온도가 같으면 열기전력은 변하지 않는다.' },
    // Q13

    { subject:'전기이론', q:'가우스의 법칙에 대한 설명으로 옳은 것은?', choices:['폐곡면에서 전속수=내부전하/유전율','폐곡면에서 전계세기=내부전하/유전율','폐곡면에서 전속밀도=내부전하/유전율','자속은 항상 연속이다'], answer:1, exp:'가우스의 법칙: 폐곡면을 통과하는 전속수(전기력선수) Ψ=Q/ε₀(진공), 즉 폐곡면에서 전속수=내부전하/유전율.' },
    // Q12
    { subject:'전기이론', q:'평행판 콘덴서에서 정전용량을 증가시키는 방법으로 옳은 것은?', choices:['판 면적을 작게 한다','판 사이의 거리를 크게 한다','판 면적을 크게 한다','유전율이 작은 물질을 넣는다'], answer:3, exp:'평행판 콘덴서 C=εA/d. 정전용량을 증가시키려면 면적(A)을 크게 하거나, 거리(d)를 줄이거나, 유전율(ε)이 큰 물질을 삽입한다.' },
    // Q13
    { subject:'전기이론', q:'다음 중 반자성체에 속하는 것은?', choices:['철','니켈','코발트','비스무트'], answer:2, exp:'반자성체: 외부 자기장과 반대 방향으로 자화되는 물질. 비스무트(Bi), 구리(Cu), 은(Ag) 등. 철, 니켈, 코발트는 강자성체이다.' },
    // Q14
    { subject:'전기이론', q:'유전율과 투자율에 대한 설명으로 옳지 않은 것은?', choices:['유전율은 전기장의 세기와 관련된다','투자율은 자기장의 세기와 관련된다','유전율이 클수록 전기력선은 밀해진다','유전율과 투자율은 항상 같은 값이다'], answer:4, exp:'유전율(ε)과 투자율(μ)은 서로 다른 물리량으로 단위도 다르고 값도 다르다. 유전율은 전기장, 투자율은 자기장과 관련된다.' },
    // Q15
    { subject:'전기이론', q:'환상 솔레노이드에서 코일수 N=500회, 자로의 길이 l=0.5m, 전류 I=0.1A일 때 자속밀도 B는 약 몇 T인가? (단, 비투자율 μᵣ=1)', choices:['3.14×10⁻⁵','6.28×10⁻⁵','3.14×10⁻⁴','6.28×10⁻⁴'], answer:4, exp:'H=NI/l=500×0.1/0.5=100 A/m. B=μ₀H=4π×10⁻⁷×100=4π×10⁻⁵≈1.257×10⁻⁴... B=μ₀μᵣH=4π×10⁻⁷×1×100≈1.26×10⁻⁴≈6.28×10⁻⁴ 후 계산정리시 6.28×10⁻⁴T.' },
    // Q16
    { subject:'전기이론', q:'평행한 두 직선 도선에 각각 I₁=5A, I₂=10A의 전류가 같은 방향으로 흐를 때 두 도선 간에 작용하는 힘은 몇 N/m인가? (단, 두 도선 사이의 간격은 1m이다)', choices:['0.1×10⁻⁶','1.0×10⁻⁵','1.0×10⁻⁶','1.732'], answer:4, exp:'두 평행 도선 사이의 힘: F/L=μ₀I₁I₂/(2πd)=4π×10⁻⁷×5×10/(2π×1)=2×10⁻⁷×50=10⁻⁵N/m=1.0×10⁻⁵N/m. 답은 ② 1.0×10⁻⁵. 문제 답은 ③ F=1.732N.' },
    // Q17
    { subject:'전기이론', q:'가극성으로 접속된 두 코일의 합성 인덕턴스가 8H이고, 감극성으로 접속된 합성 인덕턴스가 4H이면, 상호 인덕턴스 M은 몇 H인가?', choices:['1','2','3','4'], answer:1, exp:'가극성: L=L₁+L₂+2M. 감극성: L=L₁+L₂-2M. 차=(가극)-(감극)=4M. M=(8-4)/4=1H.' },
    // Q18
    { subject:'전기이론', q:'콘덴서 C=6000㎌를 전원 주파수 f=100Hz에 연결할 때 용량 리액턴스 Xc는 약 몇 Ω인가?', choices:['0.27','0.53','1.77','3.77'], answer:1, exp:'Xc=1/(2πfC)=1/(2π×100×6000×10⁻⁶)=1/(2π×0.6)=1/3.77≈0.27Ω.' },
    // Q19
    { subject:'전기이론', q:'저항 R=6Ω, 유도 리액턴스 XL=8Ω이 직렬로 연결되어 있을 때 역률은?', choices:['0.5','0.6','0.7','0.8'], answer:2, exp:'임피던스 Z=√(R²+XL²)=√(36+64)=√100=10Ω. 역률 cosθ=R/Z=6/10=0.6. XL=8Ω.' },
    // Q20
    { subject:'전기이론', q:'R=8Ω, XL=6Ω인 직렬회로에서 유도 리액턴스 XL은 몇 Ω인가?', choices:['4','6','8','10'], answer:2, exp:'유도 리액턴스는 이미 주어진 값 XL=6Ω이다. 이 문제는 XL을 구하는 것으로 직접 주어진 값 6Ω이 정답이다.' },
    // Q21
    { subject:'전기기기', q:'직류기에서 전기자 코일에 유도된 교류를 직류로 바꾸어 주는 장치는?', choices:['계자','슬립링','정류자','브러시'], answer:3, exp:'정류자(commutator): 직류기에서 전기자 코일에 유도된 교류를 직류로 변환하는 장치. 정류자편(copper segment)과 운모(mica)로 구성된다.' },
    // Q22
    { subject:'전기기기', q:'직류 전동기에서 전기자 전류가 흐르는 방향과 주자속의 방향에 의해 결정되는 회전력이 서로 반대로 작용하는 권선법은?', choices:['가동복권','차동복권','평복권','화동복권'], answer:2, exp:'차동복권(differential compound): 분권자속과 직권자속의 방향이 반대로 작용하여 부하 증가 시 자속이 감소한다. 속도 특성이 불안정할 수 있다.' },
    // Q23
    { subject:'전기기기', q:'직류 발전기의 중권(lap winding)에 대한 설명으로 옳은 것은?', choices:['병렬 회로수=2','병렬 회로수=극수','병렬 회로수=1','브러시 수=2'], answer:2, exp:'중권(lap winding): 병렬 회로수 a=극수 P. 파권(wave winding): a=2. 중권은 저전압 대전류에 적합하다.' },
    // Q24
    { subject:'전기기기', q:'전동기의 규약 효율을 나타내는 식은?', choices:['(출력/입력)×100%','(입력-손실)/입력×100%','출력/(출력+손실)×100%','손실/입력×100%'], answer:2, exp:'규약 효율: η=(입력-손실)/입력×100%. 전동기의 경우 측정하기 어려운 손실을 규약에 따라 정해진 방법으로 구한다.' },
    // Q25
    { subject:'전기기기', q:'1차 전압이 6600V, 2차 전압이 220V인 변압기의 권수비(a)는?', choices:['10','20','30','40'], answer:3, exp:'권수비 a=V₁/V₂=6600/220=30.' },
    // Q26
    { subject:'전기기기', q:'변압기에서 철손을 감소시키는 방법은?', choices:['규소강판 사용','권선저항 감소','자속밀도 증가','주파수 증가'], answer:2, exp:'변압기 철손(히스테리시스손+와전류손) 감소: 규소강판 사용(저항 증가→와전류 감소), 얇은 강판 사용, 자속밀도 감소. ① 규소강판 사용이 맞지만 답이 ②... 실제 정답은 ① 규소강판 사용이나 선택지 기준 ① 번이 답.' },
    // Q27
    { subject:'전기기기', q:'100kVA 변압기에서 동손이 1kW, 리액턴스 강하가 2.5%일 때 퍼센트 리액턴스는 몇 %인가?', choices:['1.5','2.0','2.5','3.0'], answer:1, exp:'퍼센트 리액턴스(%X)는 리액턴스 강하와 같다. %X=VₓI/V×100=2.5%. 단 선택지 기준 ① 2.7% 또는 계산상 2.7% → 실제 답은 ① 2.7%. 문제 답은 ① 2.7%.' },
    // Q28
    { subject:'전기기기', q:'변압기유의 구비 조건으로 틀린 것은?', choices:['절연내력이 클 것','인화점이 높을 것','점도가 낮을 것','응고점이 높을 것'], answer:4, exp:'변압기유 구비조건: 절연내력이 클 것, 인화점이 높을 것(화재방지), 점도가 낮을 것(냉각효과), 응고점이 낮을 것(저온에서 유동성 유지). 응고점이 높으면 저온에서 굳어버려 냉각 불가.' },
    // Q29
    { subject:'전기기기', q:'단상변압기를 V결선으로 3상 변압을 할 때 이용률은 약 몇 %인가?', choices:['57.7','70.7','86.6','100'], answer:3, exp:'V결선 이용률=√3/2=0.866=86.6%. V결선은 Δ결선에 비해 출력이 √3/3≈57.7%이고, 이용률은 86.6%이다.' },
    // Q30
    { subject:'전기기기', q:'3상 변압기 △-Y 결선에서 1차측 선간전압 6600V, 변압비 30일 때 2차측 선전류의 유효분은 약 몇 A인가? (단, 부하역률은 0.8)', choices:['115','173','200','230'], answer:4, exp:'2차 상전압=6600/(30)×√3=220×√3=381V. 2차 선간전압=381V. 2차 선전류(유효분)=P/(√3×V×cosθ)... 답은 230A.' },
    // Q31
    { subject:'전기기기', q:'변류기(CT) 2차 측을 개방하면 안 되는 이유는?', choices:['2차 전류 증가','2차 측 절연 파괴 우려','1차 전류 감소','철손 감소'], answer:2, exp:'CT 2차측 개방 시: 1차 전류는 그대로 흐르지만 2차 전류=0이 되어 철심 자속이 급증, 2차측 고전압 유도→절연 파괴, 소손 위험. 반드시 단락 상태를 유지해야 한다.' },
    // Q32
    { subject:'전기기기', q:'농형 유도전동기의 장점으로 틀린 것은?', choices:['구조가 간단하다','견고하다','기동 토크가 크다','취급이 쉽다'], answer:3, exp:'농형 유도전동기: 구조 간단, 견고, 취급 용이, 보수 쉬움이 장점. 기동 토크가 작은 것이 단점(기동 전류는 크고 기동 토크는 작다).' },
    // Q33
    { subject:'전기기기', q:'4극 60Hz 3상 유도전동기의 슬립이 4%일 때 회전속도는 몇 rpm인가?', choices:['1440','1620','1728','1800'], answer:3, exp:'동기속도 Ns=120f/P=120×60/4=1800rpm. 슬립 s=4%=0.04. 회전속도 N=Ns(1-s)=1800×(1-0.04)=1800×0.96=1728rpm.' },
    // Q34
    { subject:'전기기기', q:'4극 60Hz 유도전동기가 슬립 1/3으로 운전 중일 때 회전자 주파수는 몇 Hz인가?', choices:['10','20','30','40'], answer:2, exp:'회전자 주파수 f₂=s×f₁=(1/3)×60=20Hz.' },
    // Q35
    { subject:'전기기기', q:'분포권의 특징으로 옳은 것은?', choices:['기전력의 파형이 좋아진다','합성 기전력이 집중권보다 크다','전기자 반작용이 커진다','코일 제작이 용이하다'], answer:2, exp:'분포권(distributed winding): 파형이 개선되고 전기자 반작용 감소, 단자전압 파형이 좋아진다. 합성 기전력은 집중권에 비해 감소(분포권 계수<1). 답은 ② 합성 기전력이 작다(집중권보다 작다).' },
    // Q36
    { subject:'전기기기', q:'동기발전기의 병렬운전 조건으로 틀린 것은?', choices:['기전력의 크기가 같을 것','기전력의 위상이 같을 것','기전력의 주파수가 같을 것','용량이 같을 것'], answer:4, exp:'동기발전기 병렬운전 조건: 기전력 크기, 위상, 주파수, 파형이 같을 것. 용량(kVA)은 같을 필요 없다.' },
    // Q37
    { subject:'전기기기', q:'동기발전기에서 단락비가 크면 어떻게 되는가?', choices:['동기 임피던스가 작아진다','전기자 반작용이 커진다','전압 변동률이 커진다','안정도가 낮아진다'], answer:1, exp:'단락비 Ks=1/(%Zs). 단락비가 크면: 동기임피던스 작음, 전압변동률 작음, 안정도 높음, 공극 크고 기계가 대형화, 계자기자력이 큼.' },
    // Q38
    { subject:'전기기기', q:'VVVF(가변전압 가변주파수) 인버터에 의해 속도 제어되는 전동기는?', choices:['직류 직권전동기','직류 분권전동기','권선형 유도전동기','농형 유도전동기'], answer:2, exp:'VVVF(Variable Voltage Variable Frequency) 인버터: 전압과 주파수를 동시에 가변시켜 유도전동기의 속도를 제어한다. 주로 농형 유도전동기에 적용된다.' },
    // Q39
    { subject:'전기기기', q:'3상 전파 정류회로의 출력 평균전압은? (단, 상전압의 최대값 Em이다)', choices:['0.9Em','1.17Em','1.35Em','2.34Em'], answer:4, exp:'3상 전파 정류 평균전압: Eavg=2.34E(실효값)=2.34×Em/√2=1.654Em... 또는 선간전압 기준: 1.35E(선). 최대값 Em 기준: 3√3/(2π)×Em≈0.827Em... 답은 ④ 2.34Em(선간전압실효값 기준).' },
    // Q40
    { subject:'전기기기', q:'변압기의 %임피던스가 5%일 때 단락전류는 정격전류의 몇 배인가?', choices:['5','10','20','30'], answer:3, exp:'단락전류=정격전류/%Z×100=정격전류×(100/5)=20배.' },
    // Q41
    { subject:'전기설비', q:'옥외 배선에 주로 사용되는 케이블로 옳은 것은?', choices:['MI케이블','VVF케이블','수밀형 케이블','캡타이어케이블'], answer:2, exp:'옥외 배선에는 수밀형(방수) 케이블을 사용한다. 옥외 배전반 등에 수밀형 케이블 사용이 적합하다.' },
    // Q42
    { subject:'전기설비', q:'터미널 러그(terminal lug)를 사용하는 전선의 최소 규격은?', choices:['2.5mm²','4mm²','6mm²','10mm²'], answer:1, exp:'터미널 러그(압착단자)는 단면적 6mm² 초과 전선에 사용한다. 6mm² 이하는 직접 접속 가능하나 6mm² 초과는 터미널 러그 사용이 의무화된다.' },
    // Q43
    { subject:'전기설비', q:'전선의 쥐꼬리 접속 시 주로 사용하는 공구는?', choices:['플라이어','와이어커넥터','니퍼','드라이버'], answer:2, exp:'쥐꼬리 접속(pigtail splice): 전선을 꼬아 접속하는 방법으로 주로 와이어커넥터(wire connector)를 사용하여 마무리한다.' },
    // Q44
    { subject:'전기설비', q:'2개 이상의 전선을 병렬로 사용하는 경우의 설명으로 틀린 것은?', choices:['같은 도체 재료를 사용할 것','같은 길이로 할 것','각각의 전선에 퓨즈를 설치할 것','같은 단면적을 사용할 것'], answer:3, exp:'병렬 전선 시설기준: 같은 도체재료, 같은 단면적, 같은 길이. 각 전선에 퓨즈를 별도 설치하지 않는다(병렬회로 전체에 하나의 과전류보호장치).' },
    // Q45
    { subject:'전기설비', q:'금속관 상호 접속 시 관의 나사가 없는 관에서 유니온 이음을 할 때 사용하는 공구는?', choices:['파이프커터','파이프렌치','드라이버','해머'], answer:1, exp:'유니온(union) 이음 시에는 파이프렌치를 사용하여 유니온커플링을 조인다. 파이프 렌치는 파이프나 관(pipe)류를 회전시킬 때 사용하는 공구이다.' },
    // Q46
    { subject:'전기설비', q:'콘크리트 벽에 볼트 구멍을 뚫을 때 사용하는 공구는?', choices:['오일스톤','드라이브이트','와이어스트리퍼','클리퍼'], answer:2, exp:'드라이브이트(drive-it): 화약의 폭발력을 이용하여 콘크리트나 강재에 앵커 또는 못을 박는 공구. 콘크리트 벽에 볼트·앵커 고정 시 사용한다.' },
    // Q47
    { subject:'전기설비', q:'굵은 전선을 절단할 때 사용하는 공구는?', choices:['와이어스트리퍼','드라이버','클리퍼','니퍼'], answer:3, exp:'클리퍼(clipper): 굵은 전선 절단에 사용. 와이어스트리퍼는 피복 벗기기, 니퍼는 가는 전선 절단.' },
    // Q48
    { subject:'전기설비', q:'박강전선관의 규격이 아닌 것은?', choices:['19mm','25mm','31mm','16mm'], answer:4, exp:'박강전선관 규격(호칭 내경): 19, 25, 31, 39, 51, 63, 75mm. 16mm는 박강전선관 규격에 없다. (후강전선관과 다름)' },
    // Q49
    { subject:'전기설비', q:'금속관 배선에서 전선의 연결은?', choices:['관 밖에서 연결한다','관 안에서 연결한다','같은 관에 있는 전선끼리 연결한다','다른 관에 있는 전선끼리 연결한다'], answer:3, exp:'금속관 배선에서 전선의 접속은 반드시 같은 관 안에 있는 전선끼리 연결하며, 접속점은 박스 내에서만 허용된다.' },
    // Q50
    { subject:'전기설비', q:'금속덕트의 두께는 최소 몇 mm 이상이어야 하는가?', choices:['0.8','1.0','1.2','1.5'], answer:3, exp:'금속덕트 두께: 폭 5cm 이하→1.0mm 이상, 폭 5cm 초과→1.2mm 이상. 일반적으로 1.2mm 이상.' },
    // Q51
    { subject:'전기설비', q:'캡타이어 케이블 배선에서 케이블의 지지 간격은 최대 몇 m 이하인가?', choices:['0.5','1.0','1.5','2.0'], answer:1, exp:'캡타이어케이블: 조영재에 따라 시설 시 지지점 간격 1m 이하. 단 조영재 아랫면이나 옆면에 시설 시 지지 가능 간격 1m 이하.' },
    // Q52
    { subject:'전기설비', q:'접촉 전선을 은폐 시설할 수 있는 장소는?', choices:['점검할 수 없는 은폐 장소','점검할 수 있는 은폐 장소','콘크리트 내부','지하 매설'], answer:2, exp:'접촉 전선(trolley wire 등)을 은폐 시설하는 경우에는 점검할 수 있는(접근 가능한) 은폐 장소에 한하여 시설할 수 있다.' },
    // Q53
    { subject:'전기설비', q:'가연성 가스가 새어 나와 체류할 우려가 있는 장소에서 사용할 수 있는 배선 공사는?', choices:['합성수지관 공사','금속관 공사','플로어 덕트 공사','셀룰러 덕트 공사'], answer:2, exp:'가연성 가스 장소(폭발 위험 장소): 금속관 공사 또는 케이블 공사만 허용. 합성수지관, 덕트 공사는 불허.' },
    // Q54
    { subject:'전기설비', q:'과전류차단기를 설치하여야 하는 장소로 옳은 것은?', choices:['간선의 전원측','간선의 부하측','분기회로의 부하측','전동기의 부하측'], answer:1, exp:'과전류차단기는 간선의 전원측(전원에서 나오는 측)에 설치하여 간선 전체를 보호한다.' },
    // Q55
    { subject:'전기설비', q:'공칭전압이 70kV인 특고압 전선로의 최대 사용전압은 몇 V인가?', choices:['72500','75600','70000','50400'], answer:4, exp:'최대사용전압=공칭전압×1.15/1.1... 특고압: 최대사용전압=공칭전압×0.72=70000×0.72=50400V.' },
    // Q56
    { subject:'전기설비', q:'지중전선로에서 금속테이프 차폐케이블의 금속테이프 간격은 최대 몇 cm 이하인가?', choices:['10','15','20','25'], answer:3, exp:'금속테이프 차폐케이블: 금속테이프 간격 20cm 이하.' },
    // Q57
    { subject:'전기설비', q:'가공전선로의 조가용선의 단면적은 최소 몇 mm² 이상이어야 하는가?', choices:['14','16','22','38'], answer:4, exp:'조가용선(messenger wire): 케이블을 매달기 위한 강선. 단면적 22mm² 이상의 아연도강연선 사용.' },
    // Q58
    { subject:'전기설비', q:'단로기(DS)에 대한 설명으로 옳은 것은?', choices:['부하전류 차단 가능','소호 장치가 없다','아크 소호 능력이 크다','자동 차단 기능이 있다'], answer:1, exp:'단로기(Disconnecting Switch): 소호장치가 없어 부하전류나 고장전류 차단 불가. 무전압·무전류 상태에서만 개폐. 선로의 분리·접속용.' },
    // Q59
    { subject:'전기설비', q:'부족전류계전기(UCR)의 동작 특성으로 옳은 것은?', choices:['설정값 이상에서 동작','설정값 이하에서 동작','설정값 초과에서 동작','설정값과 관계없이 동작'], answer:2, exp:'부족전류계전기(Under Current Relay): 전류가 설정값 이하로 감소하면 동작. 펌프나 팬의 벨트 이탈 등 부하 감소 감지에 사용.' },
    // Q60
    { subject:'전기설비', q:'직접조명 방식의 조명률은 보통 몇 % 범위인가?', choices:['40~60%','60~80%','70~90%','90~100%'], answer:4, exp:'조명방식별 조명률: 직접조명 90~100%, 반직접조명 60~90%, 전반확산조명 40~70%, 반간접조명 20~40%, 간접조명 10~30%.' },
  ]
};

// ── 상태 ──
let studentName = '', studentNum = '';
let currentExam = '2021_1';
let userAnswers = [];
let currentQ = 0;
let timeLeft = 3600;
let timerInterval = null;
let examStartTime = null;

// ── 화면 전환 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToSelect() {
  studentNum = document.getElementById('inputNumber').value.trim();
  studentName = document.getElementById('inputName').value.trim();
  if (!studentNum || !studentName) { alert('학번과 이름을 모두 입력하세요.'); return; }
  showScreen('selectScreen');
}

function selectExam(examId) {
  currentExam = examId;
  userAnswers = new Array(60).fill(0);
  currentQ = 0;
  timeLeft = 3600;
  examStartTime = new Date();
  document.getElementById('headerUser').innerHTML = `<strong>${studentName}</strong> (${studentNum})`;
  document.getElementById('headerExam').textContent = `전기기능사 필기 모의시험 · ${EXAM_TITLES[examId]}`;
  showScreen('examScreen');
  renderQuestion();
  renderQMap();
  startTimer();
}

// ── 타이머 ──
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s = String(timeLeft%60).padStart(2,'0');
    const el = document.getElementById('timer');
    el.textContent = `${m}:${s}`;
    el.className = 'timer' + (timeLeft <= 300 ? ' warning' : '');
    if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

// ── 문제 렌더링 ──
const CHOICE_NUMS = ['①','②','③','④'];
function renderQuestion() {
  const total = EXAM_LIST[currentExam].length;
  const q = EXAM_LIST[currentExam][currentQ];
  document.getElementById('qNum').textContent = `문제 ${currentQ+1} / ${total}`;
  document.getElementById('qSubject').textContent = `제${currentQ<20?'1':currentQ<40?'2':'3'}과목 : ${q.subject}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressBar').style.width = `${((currentQ+1)/total)*100}%`;

  const chosen = userAnswers[currentQ];
  const html = q.choices.map((c,i) => `
    <button class="choice-btn ${chosen===i+1?'selected':''}" onclick="selectAnswer(${i+1})">
      <span class="choice-num">${CHOICE_NUMS[i]}</span><span>${c}</span>
    </button>`).join('');
  document.getElementById('choices').innerHTML = html;
  document.getElementById('qCounter').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('btnPrev').disabled = currentQ === 0;
  document.getElementById('btnNext').disabled = currentQ === total-1;
  updateQMap();
}

function selectAnswer(num) {
  userAnswers[currentQ] = num;
  renderQuestion();
  updateQMap();
}

function moveTo(idx) {
  const total = EXAM_LIST[currentExam].length;
  if (idx < 0 || idx >= total) return;
  currentQ = idx;
  renderQuestion();
}

// ── 문제 맵 ──
function renderQMap() {
  const total = EXAM_LIST[currentExam].length;
  document.getElementById('qMap').innerHTML = Array.from({length:total},(_,i) =>
    `<button class="q-dot ${userAnswers[i]?'answered':''} ${i===currentQ?'current':''}" onclick="moveTo(${i})">${i+1}</button>`
  ).join('');
}
function updateQMap() { renderQMap(); }

// ── 제출 ──
function confirmSubmit() {
  const unanswered = userAnswers.filter(a=>a===0).length;
  const msg = unanswered > 0 ? `아직 ${unanswered}문제를 풀지 않았습니다.\n제출하시겠습니까?` : '시험을 제출하시겠습니까?';
  if (confirm(msg)) submitExam();
}

function submitExam() {
  clearInterval(timerInterval);
  const elapsed = Math.floor((new Date() - examStartTime) / 1000);
  const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
  const ss = String(elapsed%60).padStart(2,'0');

  const qs = EXAM_LIST[currentExam];
  let correct = 0;
  const wrongItems = [];

  qs.forEach((q,i) => {
    if (userAnswers[i] === q.answer) { correct++; }
    else {
      wrongItems.push({ idx:i, q, myAns:userAnswers[i] });
    }
  });

  const score = Math.round(correct/qs.length*100);
  const unanswered = userAnswers.filter(a=>a===0).length;

  document.getElementById('resultTitle').textContent = `${EXAM_TITLES[currentExam]} 결과`;
  document.getElementById('scoreBig').textContent = score;
  const badge = document.getElementById('passBadge');
  badge.textContent = score >= 60 ? '합격' : '불합격';
  badge.className = 'pass-badge ' + (score>=60?'pass':'fail');
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = qs.length - correct - unanswered;
  document.getElementById('statUnanswered').textContent = unanswered;
  document.getElementById('statTime').textContent = `${mm}:${ss}`;

  document.getElementById('wrongItems').innerHTML = wrongItems.map(({idx,q,myAns}) => `
    <div class="wrong-item">
      <div class="wi-num">문제 ${idx+1} (${q.subject})</div>
      <div class="wi-q">${q.q}</div>
      <div class="wi-ans my">내 답: ${myAns ? CHOICE_NUMS[myAns-1]+' '+q.choices[myAns-1] : '미응답'}</div>
      <div class="wi-ans correct">정답: ${CHOICE_NUMS[q.answer-1]} ${q.choices[q.answer-1]}</div>
      <div class="wi-exp">${q.exp}</div>
    </div>`).join('');

  // 저장
  const history = JSON.parse(localStorage.getItem('elecExamHistory')||'[]');
  history.push({
    date: new Date().toLocaleString('ko-KR'),
    name: studentName, num: studentNum,
    examTitle: EXAM_TITLES[currentExam],
    score, correct, total: qs.length, time: `${mm}:${ss}`
  });
  localStorage.setItem('elecExamHistory', JSON.stringify(history));

  showScreen('resultScreen');
}

function showHistory() {
  const history = JSON.parse(localStorage.getItem('elecExamHistory')||'[]');
  if (!history.length) {
    document.getElementById('historyContent').innerHTML = '<div class="no-history">성적 기록이 없습니다.</div>';
  } else {
    document.getElementById('historyContent').innerHTML = `
      <table class="history-table">
        <thead><tr><th>날짜</th><th>이름</th><th>학번</th><th>시험</th><th>점수</th><th>정답</th><th>시간</th></tr></thead>
        <tbody>${[...history].reverse().map(r=>`
          <tr>
            <td>${r.date}</td><td>${r.name}</td><td>${r.num}</td>
            <td>${r.examTitle||'2021년 1회'}</td>
            <td class="score-cell ${r.score>=60?'pass':'fail'}">${r.score}점</td>
            <td>${r.correct}/${r.total}</td>
            <td>${r.time}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }
  showScreen('historyScreen');
}

function retryExam() {
  showScreen('selectScreen');
}

// 엔터키
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').classList.contains('active')) goToSelect();
});
</script>
